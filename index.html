<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Color Blend Result</title>
<style>
  :root{--bg:#f7f1e6;--panel:#fffdf8;--text:#222;--muted:#666;--border:#ddd;--shadow:0 10px 30px rgba(0,0,0,.08)}
  *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}
  .wrap{display:grid;grid-template-columns:320px 1fr;min-height:100vh;gap:24px;padding:24px}
  .left{padding:18px;border-radius:24px;background:rgba(255,255,255,.3);border:1px solid rgba(0,0,0,.04)}
  .title{margin:0 0 8px;font-size:28px;line-height:1.2}.desc{margin:0 0 18px;color:var(--muted);font-size:14px;line-height:1.6}
  .palette{display:grid;gap:10px}
  .color-btn{display:grid;grid-template-columns:1fr 18px;align-items:center;gap:12px;width:100%;border:1px solid var(--border);border-radius:16px;background:#fff;padding:10px 12px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .color-btn.active{outline:3px solid rgba(0,0,0,.08)} .name{font-size:14px;font-weight:700;text-align:left}.swatch{width:18px;height:100%;min-height:42px;border-radius:10px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.controls button{border:1px solid var(--border);background:#fff;border-radius:999px;padding:10px 14px;cursor:pointer}
  .right{background:var(--panel);border-radius:32px;box-shadow:var(--shadow);padding:24px;display:flex;flex-direction:column;gap:18px}
  .mix-area{display:flex;justify-content:center;align-items:center;gap:18px;padding:12px 8px 24px;border-bottom:1px solid #eee}
  .mix-circle{width:min(26vw,170px);aspect-ratio:1;border-radius:50%;box-shadow:inset 0 -18px 30px rgba(0,0,0,.08), inset 0 14px 20px rgba(255,255,255,.25)}
  .plus{font-size:42px;color:#bbb;font-weight:300}.label{text-align:center;font-size:12px;letter-spacing:.12em;color:#777;margin-top:10px}
  .result{text-align:center;display:grid;gap:12px}.result h2{margin:0;font-size:16px;letter-spacing:.12em;color:#666}
  .result-circle{width:min(42vw,260px);aspect-ratio:1;border-radius:50%;margin:0 auto;box-shadow:inset 0 -18px 30px rgba(0,0,0,.08), inset 0 14px 20px rgba(255,255,255,.25)}
  .hex{font-size:18px;font-weight:800}.formula{color:var(--muted);font-size:14px}
  @media (max-width:900px){.wrap{grid-template-columns:1fr}.left{order:2}.right{order:1}}
</style>
</head>
<body>
<div class="wrap">
  <aside class="left">
    <h1 class="title">색 섞기 결과</h1>
    <p class="desc">왼쪽에서 두 색을 누르면 아래에 바로 혼합 결과가 표시됩니다.</p>
    <div class="palette" id="palette"></div>
    <div class="controls">
      <button id="swapBtn">선택색 바꾸기</button>
      <button id="resetBtn">초기화</button>
    </div>
  </aside>
  <main class="right">
    <div class="mix-area">
      <div>
        <div class="mix-circle" id="leftColor"></div>
        <div class="label" id="leftLabel">선택 1</div>
      </div>
      <div class="plus">+</div>
      <div>
        <div class="mix-circle" id="rightColor"></div>
        <div class="label" id="rightLabel">선택 2</div>
      </div>
    </div>
    <div class="result">
      <h2>결과 색</h2>
      <div class="result-circle" id="resultColor"></div>
      <div class="hex" id="hexText"></div>
      <div class="formula" id="formulaText"></div>
    </div>
  </main>
</div>
<script>
const colors = [
  {name:'매트 화이트', hex:'#F5F1EA'},
  {name:'레몬 옐로우', hex:'#F6D32D'},
  {name:'퍼먼트 옐로우 딥', hex:'#F29F05'},
  {name:'버밀리온 휴', hex:'#D7262B'},
  {name:'레드', hex:'#C81D25'},
  {name:'오페라', hex:'#F4368B'},
  {name:'울트라마린', hex:'#2B3FAE'},
  {name:'세루리안 블루 휴', hex:'#1674B6'},
  {name:'피콕 그린', hex:'#0B6E79'},
  {name:'에메랄드 그린 휴', hex:'#10A88B'},
  {name:'번트 시에나', hex:'#7A3B2E'},
  {name:'로우 엄버', hex:'#5F4A3F'},
  {name:'데이비스 그레이', hex:'#8D8C91'}
];
let left = colors[3], right = colors[6], selectedIndex = 0;
const palette = document.getElementById('palette');
const leftColor = document.getElementById('leftColor');
const rightColor = document.getElementById('rightColor');
const leftLabel = document.getElementById('leftLabel');
const rightLabel = document.getElementById('rightLabel');
const resultColor = document.getElementById('resultColor');
const hexText = document.getElementById('hexText');
const formulaText = document.getElementById('formulaText');
function hexToRgb(h){const n=parseInt(h.slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255]}
function rgbToHex(r,g,b){return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('').toUpperCase()}
function mix(hex1, hex2){const [r1,g1,b1]=hexToRgb(hex1), [r2,g2,b2]=hexToRgb(hex2); return rgbToHex(Math.round((r1+r2)/2),Math.round((g1+g2)/2),Math.round((b1+b2)/2))}
function renderPalette(){palette.innerHTML=''; colors.forEach((c,i)=>{const btn=document.createElement('button'); btn.className='color-btn'+(i===selectedIndex?' active':''); btn.innerHTML=`<span class="name">${c.name}</span><span class="swatch" style="background:${c.hex}"></span>`; btn.onclick=()=>{if(selectedIndex===0) left=c; else right=c; selectedIndex = selectedIndex===0 ? 1 : 0; renderAll();}; palette.appendChild(btn)})}
function renderAll(){leftColor.style.background=left.hex; rightColor.style.background=right.hex; leftLabel.textContent=left.name; rightLabel.textContent=right.name; const result=mix(left.hex,right.hex); resultColor.style.background=result; hexText.textContent=result; formulaText.textContent=`${left.hex} + ${right.hex} → 평균 혼합` ; renderPalette()}
document.getElementById('swapBtn').onclick=()=>{[left,right]=[right,left]; renderAll()}; document.getElementById('resetBtn').onclick=()=>{left=colors[3]; right=colors[6]; selectedIndex=0; renderAll()}; renderAll();
</script>
</body>
</html>
